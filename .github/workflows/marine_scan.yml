name: Marine Exchange Event Scan

on:
  schedule:
    - cron: '0 14 * * 1-5'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  run-marine-agent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4.2.2

      - name: Set up Python Environment
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Marine Agent Scan
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python marine_agent.py

      - name: Commit Report File Changes
        run: |
          git config --global user.name "Automated Scan Agent"
          git config --global user.email "agent@github.com"
          git add *.md
          git commit -m "Automated morning scan matches updated [skip ci]" || exit 0
          git push

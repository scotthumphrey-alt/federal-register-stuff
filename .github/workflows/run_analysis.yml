name: Fiscal Budget Automation Agent

on:
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4.2.2

      - name: Init Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.10'

      - name: Setup Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl google-genai

      - name: Process Projections
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python budget_agent.py

      - name: Commit Report
        run: |
          git config --global user.name "Finance Agent"
          git config --global user.email "agent@github.com"
          git add budget_proposal_fy27.md
          git commit -m "FY27 budget matrix compiled [skip ci]" || exit 0
          git push

      - name: Email Report Matrix
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Recommended FY27 Fiscal Budget Proposal Matrix"
          to: ${{ secrets.EMAIL_USERNAME }}
          from: "Finance Agent <${{ secrets.EMAIL_USERNAME }}>"
          html_body: file://budget_proposal_fy27.md
          convert_markdown: true
